name: Build Android APK
on:
  push:
    branches: [ main, master ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v3
    - name: Setup Java
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'zulu'
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 18
    - name: Install Dependencies and Prepare Android
      run: |
        npm install
        npx cap init "Aether Tunnel" "com.matin.aethertunnel" --web-dir=.
        npx cap add android
    - name: Compile Android APK
      run: |
        cd android
        ./gradlew assembleDebug
    - name: Upload Ready APK
      uses: actions/upload-artifact@v3
      with:
        name: Aether-Tunnel-App
        path: android/app/build/outputs/apk/debug/app-debug.apk
